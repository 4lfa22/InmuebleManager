# ========================================
# CONFIGURACIÓN DE PRODUCCIÓN
# ========================================

# Puerto del servidor
server.port=8080

# ========================================
# DATABASE - PRODUCCIÓN
# ========================================
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:gestion_inmuebles}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# ========================================
# JPA / HIBERNATE - PRODUCCIÓN
# ========================================
# IMPORTANTE: En producción usar 'validate' para no modificar BD
spring.jpa.hibernate.ddl-auto=validate

# No mostrar SQL en producción
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Dialecto de PostgreSQL
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ========================================
# LOGGING - PRODUCCIÓN
# ========================================
logging.level.root=WARN
logging.level.com.inmueblemanager=INFO
logging.file.name=logs/application.log
logging.file.max-size=10MB
logging.file.max-history=10

# ========================================
# SWAGGER / OPENAPI - DESACTIVADO EN PRODUCCIÓN
# ========================================
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=false

# ========================================
# JWT - PRODUCCIÓN
# ========================================
app.jwt.secret=${JWT_SECRET:changeme_min_32_chars_required_in_production}
app.jwt.expiration=${JWT_EXPIRATION:3600000}

# ========================================
# MULTIPART / FILE UPLOADS
# ========================================
server.tomcat.max-http-post-size=20MB
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# ========================================
# CORS - Permitir frontend de Vercel
# ========================================
# Esta configuración se maneja en CorsConfig.java
# Se recomienda configurar FRONTEND_URL como variable de entorno
