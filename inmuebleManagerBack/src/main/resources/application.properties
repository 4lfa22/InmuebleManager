# =========================
# CONFIGURACI�N SERVIDOR
# =========================
server.port=8080
server.tomcat.max-http-post-size=20MB
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# =========================
# CONFIGURACI�N BBDD (PostgreSQL)
# =========================
spring.datasource.url=jdbc:postgresql://localhost:5432/gestion_inmuebles
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# =========================
# JPA / HIBERNATE
# =========================
# Crea/actualiza las tablas seg�n las entidades
spring.jpa.hibernate.ddl-auto=update

# Para ver las consultas SQL en consola (�til para aprender)
spring.jpa.show-sql=true

# Formatear SQL (para que no salga todo en una sola l�nea)
spring.jpa.properties.hibernate.format_sql=true

# Dialecto de PostgreSQL
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# =========================
# LOGGING
# =========================
# Nivel de log general
logging.level.root=INFO

# Ver m�s detalle de SQL / JPA si quieres
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# =========================
# SWAGGER / OPENAPI
# =========================
# (con springdoc normalmente no hace falta casi nada,
# pero esto ayuda a que el path sea claro)
springdoc.api-docs.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html

# =========================
# JWT
# =========================
# Clave secreta para firmar tokens (mínimo 512 bits para HS512)
app.jwt.secret=${JWT_SECRET:mySecretKeyForInmuebleManagerApplicationSecurityPleaseChangeMeInProductionEnvironmentWithAVeryLongAndSecureKeyOf512BitsOrMoreForHS512Algorithm123456789}
# Expiración en milisegundos (3600000 = 1 hora)
app.jwt.expiration=${JWT_EXPIRATION:3600000}

# =========================
# EMAIL - 2FA
# =========================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:tu-email@gmail.com}
spring.mail.password=${MAIL_PASSWORD:tu-app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
