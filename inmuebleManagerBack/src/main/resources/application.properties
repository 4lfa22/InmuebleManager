# =========================
# CONFIGURACIÓN SERVIDOR
# =========================
server.port=8080

# =========================
# CONFIGURACIÓN BBDD (PostgreSQL)
# =========================
spring.datasource.url=jdbc:postgresql://localhost:5432/gestion_inmuebles
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# =========================
# JPA / HIBERNATE
# =========================
# Crea/actualiza las tablas según las entidades
spring.jpa.hibernate.ddl-auto=update

# Para ver las consultas SQL en consola (útil para aprender)
spring.jpa.show-sql=true

# Formatear SQL (para que no salga todo en una sola línea)
spring.jpa.properties.hibernate.format_sql=true

# Dialecto de PostgreSQL
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# =========================
# LOGGING
# =========================
# Nivel de log general
logging.level.root=INFO

# Ver más detalle de SQL / JPA si quieres
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# =========================
# SWAGGER / OPENAPI
# =========================
# (con springdoc normalmente no hace falta casi nada,
# pero esto ayuda a que el path sea claro)
springdoc.api-docs.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html

# =========================
# JWT (dejamos variables preparadas)
# =========================
# Clave secreta para firmar tokens (luego la usaremos en JwtService)
# En producción debería ser más larga y segura, aquí vale para desarrollo
app.jwt.secret=mi_super_clave_secreta_para_dev_123456
# Tiempo de expiración del token en milisegundos (ej: 1 hora)
app.jwt.expiration=3600000
